<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Social Links</title>
    <style>
        /* Modern Purple Gradient Background */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #2e026d 0%, #5b21b6 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        /* Profile Container */
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
            width: 90%;
            max-width: 400px;
        }

        /* Profile Picture */
        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #a78bfa;
            margin-bottom: 20px;
        }

        h1 {
            margin: 10px 0 5px 0;
            font-size: 1.8rem;
        }

        p {
            opacity: 0.8;
            margin-bottom: 30px;
        }

        /* Social Links */
        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-item {
            background: #ffffff;
            color: #2e026d;
            text-decoration: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: bold;
            transition: transform 0.2s, background 0.2s;
        }

        /* Hover Effects */
        .link-item:hover {
            transform: scale(1.05);
            background: #f3e8ff;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="MitchLogo.webp" alt="Profile Picture" class="profile-pic">
        
        <h1>Mitch Cerroni</h1>
        <p>3D Printing, Robotics, and Prototyping</p>

        <div class="links">
            <a href="https://bsky.app/profile/themitch22.bsky.social" class="link-item" target="_blank">Bluesky/a>
            <a href="https://www.instagram.com/themitch22/" class="link-item" target="_blank">Instagram</a>
            <a href="https://www.linkedin.com/in/mitch-cerroni-a6338247/" class="link-item" target="_blank">LinkedIn</a>
            <a href="https://github.com/themitch22/" class="link-item" target="_blank">GitHub</a>
            <a href="https://x.com/themitch22" class="link-item" target="_blank">Twitter / X</a>
        </div>
    </div>

</body>
</html>
